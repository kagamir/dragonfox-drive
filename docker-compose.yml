services:
  dragonfox-drive:
    build:
      context: .
      dockerfile: Dockerfile
    image: dragonfox-drive:latest
    container_name: dragonfox-drive
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      # Persistent encrypted blobs + SQLite database.
      - dragonfox-data:/app/data
    environment:
      RUST_LOG: info,dragonfox_drive=debug
      # IMPORTANT: override the JWT secret in production!
      DRAGONFOX__JWT__SECRET: change-me-to-a-long-random-secret
      # Optional tweaks:
      # DRAGONFOX__LIMITS__MAX_CHUNK_BYTES: 8388608
      # DRAGONFOX__LIMITS__RATE_LIMIT_PER_MINUTE: 600

volumes:
  dragonfox-data:
