# DragonFox Drive - Server Configuration
# Copy to .env or set as environment variables.

# Server bind address.
[server]
host = "0.0.0.0"
port = 8080

# Directory where encrypted file chunks are stored on disk.
[storage]
data_dir = "./data"

# SQLite database file path.
[database]
url = "sqlite://./data/dragonfox.db?mode=rwc"

# JWT signing TTLs. The signing secret itself is NOT configurable: the server
# generates a fresh random secret on every startup, which invalidates all
# previously issued tokens (every user must sign in again after a restart).
[jwt]
access_ttl_seconds = 900         # 15 minutes
refresh_ttl_seconds = 2592000    # 30 days

# Access policy.
[security]
# Whether new accounts may self-register via POST /api/auth/register (and the
# /register page). Defaults to true. Set to false once the operator account
# exists to lock the instance down.
allow_registration = true

# Sizing knobs.
[limits]
# Total per-file cap, checked by POST /api/files on `total_size`. Must be > 0
# (a value of 0 disables the total-size check). Default 100 GiB.
max_file_bytes = 107374182400        # 100 GiB total-file cap (checked by POST /api/files on total_size)
# Per request/chunk body cap, applied as the router-wide DefaultBodyLimit so
# it bounds every request body (auth JSON is tiny; an encrypted chunk is the
# real consumer). Must be > 0 — a value of 0 rejects ALL bodies (HTTP 413).
max_chunk_bytes = 8388608        # 8 MiB encrypted chunk hard cap
rate_limit_per_minute = 600
