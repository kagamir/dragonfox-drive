# DragonFox Drive - Server Configuration
# Copy to .env or set as environment variables.

# Server bind address.
[server]
host = "0.0.0.0"
port = 8080

# Directory where encrypted file chunks are stored on disk.
[storage]
data_dir = "./data"

# SQLite database file path.
[database]
url = "sqlite://./data/dragonfox.db?mode=rwc"

# JWT signing secret. CHANGE THIS in production. Use `openssl rand -hex 32`.
[jwt]
secret = "change-me-to-a-long-random-secret-in-production"
access_ttl_seconds = 900         # 15 minutes
refresh_ttl_seconds = 2592000    # 30 days

# Sizing knobs.
[limits]
# Total per-file cap, checked by POST /api/files on `total_size`. Must be > 0
# (a value of 0 disables the total-size check). Default 10 GiB.
max_file_bytes = 10737418240
# Per request/chunk body cap, applied as the router-wide DefaultBodyLimit so
# it bounds every request body (auth JSON is tiny; an encrypted chunk is the
# real consumer). Must be > 0 — a value of 0 rejects ALL bodies (HTTP 413).
max_chunk_bytes = 8388608        # 8 MiB encrypted chunk hard cap
rate_limit_per_minute = 600
