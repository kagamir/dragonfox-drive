name: release-binaries

on:
  push:
    tags:
      - v*

permissions:
  contents: read
  id-token: write
  attestations: write

concurrency:
  group: binaries-${{ github.ref }}
  cancel-in-progress: false

env:
  BINARY_NAME: dragonfox-drive

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { target: x86_64-pc-windows-msvc,         os: windows-latest, archive: zip, use_zig: false }
          - { target: aarch64-pc-windows-msvc,        os: windows-latest, archive: zip, use_zig: false }
          - { target: i686-pc-windows-msvc,           os: windows-latest, archive: zip, use_zig: false }
          - { target: x86_64-unknown-linux-musl,      os: ubuntu-latest,  archive: tar, use_zig: true  }
          - { target: aarch64-unknown-linux-musl,     os: ubuntu-latest,  archive: tar, use_zig: true  }
          - { target: armv7-unknown-linux-musleabihf, os: ubuntu-latest,  archive: tar, use_zig: true  }
          - { target: x86_64-apple-darwin,            os: macos-latest,   archive: tar, use_zig: false }
          - { target: aarch64-apple-darwin,           os: macos-latest,   archive: tar, use_zig: false }
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Build frontend
        working-directory: web
        run: |
          npm ci
          npm run build

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable
        with:
          targets: ${{ matrix.target }}

      - name: Setup Zig (musl cross)
        if: matrix.use_zig
        uses: goto-bus-stop/setup-zig@abea47f85e598557f500fa1fd2ab7464fcb39406  # v2.2.1
        with:
          version: 0.13.0

      - name: Install cargo-zigbuild (musl cross)
        if: matrix.use_zig
        run: cargo install --locked cargo-zigbuild

      - name: Build binary (musl via zigbuild)
        if: matrix.use_zig
        working-directory: server
        run: cargo zigbuild --release --target ${{ matrix.target }}

      - name: Build binary
        if: ${{ !matrix.use_zig }}
        working-directory: server
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package (zip)
        if: matrix.archive == 'zip'
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          cd "server/target/${{ matrix.target }}/release"
          7z a "$GITHUB_WORKSPACE/${{ env.BINARY_NAME }}-$VERSION-${{ matrix.target }}.zip" ${{ env.BINARY_NAME }}.exe

      - name: Package (tar.gz)
        if: matrix.archive == 'tar'
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          tar -C "server/target/${{ matrix.target }}/release" -czf \
            "${{ env.BINARY_NAME }}-$VERSION-${{ matrix.target }}.tar.gz" ${{ env.BINARY_NAME }}

      - name: Attest build provenance
        uses: actions/attest-build-provenance@e8998f949152b193b063cb0ec769d69d929409be  # v2
        with:
          subject-path: ${{ env.BINARY_NAME }}-*-${{ matrix.target }}.*

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: ${{ matrix.target }}
          path: ${{ env.BINARY_NAME }}-*-${{ matrix.target }}.*
          if-no-files-found: error

  release:
    name: Publish release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Download all artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate SHA256SUMS
        working-directory: artifacts
        run: sha256sum * > ../SHA256SUMS

      - name: Attach to GitHub Release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65  # v2
        with:
          tag_name: ${{ github.ref_name }}
          files: |
            artifacts/*
            SHA256SUMS
